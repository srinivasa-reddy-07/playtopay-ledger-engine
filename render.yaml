databases:
  - name: playtopay_db
    plan: free

services:
  - type: web
    name: playtopay-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn playtopay.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playtopay_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DJANGO_SETTINGS_MODULE
        value: playtopay.settings